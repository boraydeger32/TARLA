<!-- Dashboard page template -->
<div x-data="dashboardPage" class="space-y-6">
  <!-- Page Header -->
  <div class="border-b border-gray-200 pb-4 dark:border-gray-700">
    <h1
      class="text-2xl font-bold text-gray-900 dark:text-white"
      x-t="'dashboard:title'"
    ></h1>
  </div>

  <!-- Error Banner -->
  <template x-if="error">
    <div
      class="rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-700 dark:border-red-800 dark:bg-red-900/20 dark:text-red-400"
      role="alert"
    >
      <span x-text="error.message || 'Veriler yüklenirken bir hata oluştu.'"></span>
    </div>
  </template>

  <!-- ── Stat Cards ── -->
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">

    <!-- Active Listings -->
    <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
      <div class="flex items-center justify-between">
        <div class="min-w-0 flex-1">
          <p
            class="text-sm font-medium text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.active_listings'"
          ></p>
          <template x-if="loading.stats">
            <div class="mt-1 h-8 w-24 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div>
          </template>
          <template x-if="!loading.stats">
            <p
              class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
              x-text="getStatValue('active_listings')"
            ></p>
          </template>
        </div>
        <div class="ml-4 flex-shrink-0 rounded-full bg-blue-100 p-3 dark:bg-blue-900/30">
          <svg class="h-6 w-6 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
        </div>
      </div>
      <template x-if="!loading.stats && stats">
        <div class="mt-3 flex items-center text-sm">
          <span
            x-show="getStatChange('active_listings') > 0"
            class="flex items-center text-green-600 dark:text-green-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
            <span x-text="'+' + Math.abs(getStatChange('active_listings')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('active_listings') < 0"
            class="flex items-center text-red-600 dark:text-red-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
            <span x-text="Math.abs(getStatChange('active_listings')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('active_listings') === 0"
            class="text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.no_change'"
          ></span>
        </div>
      </template>
    </div>

    <!-- Pending Reviews (clickable) -->
    <a
      href="/admin/moderation"
      class="block rounded-lg bg-white p-5 shadow-sm transition-shadow hover:shadow-md dark:bg-gray-800"
    >
      <div class="flex items-center justify-between">
        <div class="min-w-0 flex-1">
          <p
            class="text-sm font-medium text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.pending_reviews'"
          ></p>
          <template x-if="loading.stats">
            <div class="mt-1 h-8 w-24 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div>
          </template>
          <template x-if="!loading.stats">
            <p
              class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
              x-text="getStatValue('pending_count')"
            ></p>
          </template>
        </div>
        <div class="ml-4 flex-shrink-0 rounded-full bg-amber-100 p-3 dark:bg-amber-900/30">
          <svg class="h-6 w-6 text-amber-600 dark:text-amber-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
      </div>
      <template x-if="!loading.stats && stats">
        <div class="mt-3 flex items-center text-sm">
          <span
            x-show="getStatChange('pending_count') > 0"
            class="flex items-center text-green-600 dark:text-green-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
            <span x-text="'+' + Math.abs(getStatChange('pending_count')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('pending_count') < 0"
            class="flex items-center text-red-600 dark:text-red-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
            <span x-text="Math.abs(getStatChange('pending_count')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('pending_count') === 0"
            class="text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.no_change'"
          ></span>
        </div>
      </template>
    </a>

    <!-- Total Users -->
    <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
      <div class="flex items-center justify-between">
        <div class="min-w-0 flex-1">
          <p
            class="text-sm font-medium text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.total_users'"
          ></p>
          <template x-if="loading.stats">
            <div class="mt-1 h-8 w-24 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div>
          </template>
          <template x-if="!loading.stats">
            <p
              class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
              x-text="getStatValue('total_users')"
            ></p>
          </template>
        </div>
        <div class="ml-4 flex-shrink-0 rounded-full bg-green-100 p-3 dark:bg-green-900/30">
          <svg class="h-6 w-6 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
          </svg>
        </div>
      </div>
      <template x-if="!loading.stats && stats">
        <div class="mt-3 flex items-center text-sm">
          <span
            x-show="getStatChange('total_users') > 0"
            class="flex items-center text-green-600 dark:text-green-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
            <span x-text="'+' + Math.abs(getStatChange('total_users')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('total_users') < 0"
            class="flex items-center text-red-600 dark:text-red-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
            <span x-text="Math.abs(getStatChange('total_users')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('total_users') === 0"
            class="text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.no_change'"
          ></span>
        </div>
      </template>
    </div>

    <!-- Monthly Revenue -->
    <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
      <div class="flex items-center justify-between">
        <div class="min-w-0 flex-1">
          <p
            class="text-sm font-medium text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.monthly_revenue'"
          ></p>
          <template x-if="loading.stats">
            <div class="mt-1 h-8 w-24 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div>
          </template>
          <template x-if="!loading.stats">
            <p
              class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
              x-text="getStatValue('revenue', true)"
            ></p>
          </template>
        </div>
        <div class="ml-4 flex-shrink-0 rounded-full bg-purple-100 p-3 dark:bg-purple-900/30">
          <svg class="h-6 w-6 text-purple-600 dark:text-purple-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z" />
          </svg>
        </div>
      </div>
      <template x-if="!loading.stats && stats">
        <div class="mt-3 flex items-center text-sm">
          <span
            x-show="getStatChange('revenue') > 0"
            class="flex items-center text-green-600 dark:text-green-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" /></svg>
            <span x-text="'+' + Math.abs(getStatChange('revenue')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('revenue') < 0"
            class="flex items-center text-red-600 dark:text-red-400"
          >
            <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
            <span x-text="Math.abs(getStatChange('revenue')) + '%'"></span>
          </span>
          <span
            x-show="getStatChange('revenue') === 0"
            class="text-gray-500 dark:text-gray-400"
            x-t="'dashboard:stats.no_change'"
          ></span>
        </div>
      </template>
    </div>

  </div>

  <!-- ── Charts Grid ── -->
  <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">

    <!-- Listings Over Time — Line Chart -->
    <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
      <h3
        class="mb-4 text-lg font-semibold text-gray-900 dark:text-white"
        x-t="'dashboard:charts.listings_over_time'"
      ></h3>
      <template x-if="loading.charts">
        <div class="flex h-[350px] items-center justify-center">
          <div class="h-8 w-8 animate-spin rounded-full border-4 border-gray-200 border-t-blue-600 dark:border-gray-600 dark:border-t-blue-400"></div>
        </div>
      </template>
      <template x-if="!loading.charts && charts">
        <div
          x-data="lineChart({
            series: charts.listings_over_time.series,
            xaxis: { categories: charts.listings_over_time.labels },
            colors: ['#3b82f6', '#10b981']
          })"
        >
          <div x-ref="chartContainer"></div>
        </div>
      </template>
    </div>

    <!-- Category Distribution — Pie Chart -->
    <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
      <h3
        class="mb-4 text-lg font-semibold text-gray-900 dark:text-white"
        x-t="'dashboard:charts.category_distribution'"
      ></h3>
      <template x-if="loading.charts">
        <div class="flex h-[350px] items-center justify-center">
          <div class="h-8 w-8 animate-spin rounded-full border-4 border-gray-200 border-t-blue-600 dark:border-gray-600 dark:border-t-blue-400"></div>
        </div>
      </template>
      <template x-if="!loading.charts && charts">
        <div
          x-data="pieChart({
            series: charts.listings_by_category.series,
            labels: charts.listings_by_category.labels,
            colors: ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#6b7280']
          })"
        >
          <div x-ref="chartContainer"></div>
        </div>
      </template>
    </div>

    <!-- Revenue Breakdown — Bar Chart -->
    <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
      <h3
        class="mb-4 text-lg font-semibold text-gray-900 dark:text-white"
        x-t="'dashboard:charts.revenue_breakdown'"
      ></h3>
      <template x-if="loading.charts">
        <div class="flex h-[350px] items-center justify-center">
          <div class="h-8 w-8 animate-spin rounded-full border-4 border-gray-200 border-t-blue-600 dark:border-gray-600 dark:border-t-blue-400"></div>
        </div>
      </template>
      <template x-if="!loading.charts && charts">
        <div
          x-data="barChart({
            series: charts.revenue_by_month.series,
            xaxis: { categories: charts.revenue_by_month.labels },
            colors: ['#8b5cf6']
          })"
        >
          <div x-ref="chartContainer"></div>
        </div>
      </template>
    </div>

    <!-- User Registrations — Area Chart -->
    <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
      <h3
        class="mb-4 text-lg font-semibold text-gray-900 dark:text-white"
        x-t="'dashboard:charts.user_registrations'"
      ></h3>
      <template x-if="loading.charts">
        <div class="flex h-[350px] items-center justify-center">
          <div class="h-8 w-8 animate-spin rounded-full border-4 border-gray-200 border-t-blue-600 dark:border-gray-600 dark:border-t-blue-400"></div>
        </div>
      </template>
      <template x-if="!loading.charts && charts">
        <div
          x-data="areaChart({
            series: charts.user_growth.series,
            xaxis: { categories: charts.user_growth.labels },
            colors: ['#10b981', '#6366f1']
          })"
        >
          <div x-ref="chartContainer"></div>
        </div>
      </template>
    </div>

  </div>

  <!-- ── Recent Activity Feed ── -->
  <div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
    <div class="mb-4 flex items-center justify-between">
      <h3
        class="text-lg font-semibold text-gray-900 dark:text-white"
        x-t="'dashboard:recent_activity.title'"
      ></h3>
      <a
        href="/admin/logs"
        class="text-sm font-medium text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300"
        x-t="'dashboard:recent_activity.view_all'"
      ></a>
    </div>

    <!-- Loading Skeleton -->
    <template x-if="loading.activities">
      <div class="space-y-4">
        <template x-for="i in 5" :key="i">
          <div class="flex items-start gap-3">
            <div class="h-8 w-8 flex-shrink-0 animate-pulse rounded-full bg-gray-200 dark:bg-gray-700"></div>
            <div class="flex-1 space-y-2">
              <div class="h-4 w-3/4 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div>
              <div class="h-3 w-1/2 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Activity List -->
    <template x-if="!loading.activities">
      <div>
        <!-- Empty State -->
        <template x-if="activities.length === 0">
          <p
            class="py-8 text-center text-sm text-gray-500 dark:text-gray-400"
            x-t="'dashboard:recent_activity.empty'"
          ></p>
        </template>

        <!-- Activity Entries -->
        <template x-if="activities.length > 0">
          <div class="divide-y divide-gray-100 dark:divide-gray-700">
            <template x-for="activity in activities" :key="activity.id">
              <div class="flex items-start gap-3 py-3 first:pt-0 last:pb-0">
                <!-- Action Color Indicator -->
                <div
                  class="mt-0.5 flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-full"
                  :class="getActivityColor(activity.action)"
                >
                  <div class="h-2.5 w-2.5 rounded-full bg-current"></div>
                </div>
                <!-- Activity Details -->
                <div class="min-w-0 flex-1">
                  <p
                    class="text-sm text-gray-900 dark:text-gray-100"
                    x-text="activity.description"
                  ></p>
                  <div class="mt-1 flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
                    <span x-text="getActivityUser(activity)"></span>
                    <span>&middot;</span>
                    <span x-text="getActivityTime(activity.created_at)"></span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>
  </div>
</div>
