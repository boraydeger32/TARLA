<!--
  Stat Card Partial
  Renders a single KPI stat card with value, percentage change indicator, and icon.
  Used within the dashboard page stat cards grid.

  Expected scope variables (from parent dashboardPage):
  - loading.stats: boolean — whether stats data is still loading
  - stats: object|null — dashboard stat card data from API
  - getStatValue(key, isCurrency?): string|number — formatted stat display value
  - getStatChange(key): number — percentage change from prior period

  Tokens to replace when instantiating:
  - {STAT_KEY}       — stats object key (e.g. 'active_listings', 'pending_count')
  - {TITLE_I18N_KEY} — i18n key for card label (e.g. 'dashboard:stats.active_listings')
  - {BG_CLASS}       — icon background class (e.g. 'bg-blue-100 dark:bg-blue-900/30')
  - {ICON_CLASS}     — icon color class (e.g. 'text-blue-600 dark:text-blue-400')
  - {SVG_PATH}       — Heroicon SVG path data
  - {IS_CURRENCY}    — true for revenue card, omit for count-based cards
-->
<div class="rounded-lg bg-white p-5 shadow-sm dark:bg-gray-800">
  <div class="flex items-center justify-between">
    <div class="min-w-0 flex-1">
      <!-- Card title -->
      <p
        class="text-sm font-medium text-gray-500 dark:text-gray-400"
        x-t="'{TITLE_I18N_KEY}'"
      ></p>
      <!-- Loading skeleton -->
      <template x-if="loading.stats">
        <div class="mt-1 h-8 w-24 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div>
      </template>
      <!-- Stat value -->
      <template x-if="!loading.stats">
        <p
          class="mt-1 text-2xl font-bold text-gray-900 dark:text-white"
          x-text="getStatValue('{STAT_KEY}', {IS_CURRENCY})"
        ></p>
      </template>
    </div>
    <!-- Icon container with themed background -->
    <div class="ml-4 flex-shrink-0 rounded-full p-3 {BG_CLASS}">
      <svg class="h-6 w-6 {ICON_CLASS}" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="{SVG_PATH}" />
      </svg>
    </div>
  </div>
  <!-- Change indicator -->
  <template x-if="!loading.stats && stats">
    <div class="mt-3 flex items-center text-sm">
      <!-- Positive change (green, arrow up) -->
      <span
        x-show="getStatChange('{STAT_KEY}') > 0"
        class="flex items-center text-green-600 dark:text-green-400"
      >
        <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
        </svg>
        <span x-text="'+' + Math.abs(getStatChange('{STAT_KEY}')) + '%'"></span>
      </span>
      <!-- Negative change (red, arrow down) -->
      <span
        x-show="getStatChange('{STAT_KEY}') < 0"
        class="flex items-center text-red-600 dark:text-red-400"
      >
        <svg class="mr-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
        <span x-text="Math.abs(getStatChange('{STAT_KEY}')) + '%'"></span>
      </span>
      <!-- No change -->
      <span
        x-show="getStatChange('{STAT_KEY}') === 0"
        class="text-gray-500 dark:text-gray-400"
        x-t="'dashboard:stats.no_change'"
      ></span>
    </div>
  </template>
</div>
